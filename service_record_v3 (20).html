<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>客戶服務紀錄單</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #e8eaf0;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 12mm 14mm;
    padding-bottom: 80px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 10px;
    border-bottom: 3px solid #1a3a6b;
    margin-bottom: 6px;
  }
  .logo-placeholder {
    width: 110px;
    height: 48px;
    border: 1.5px dashed #aaa;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #aaa;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .company-info {
    font-size: 10.5px;
    color: #444;
    line-height: 1.7;
    flex: 1;
  }
  .doc-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #1a3a6b;
    padding: 10px 0 8px;
    border-bottom: 1px solid #c8d0e0;
    margin-bottom: 10px;
  }

  /* ── Section label ── */
  .section {
    background: #1a3a6b;
    color: #fff;
    font-size: 13.5px;
    font-weight: 500;
    padding: 3px 10px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    margin-top: 10px;
  }

  /* ── Grid rows ── */
  .row {
    display: flex;
    align-items: stretch;
    border: 0.5px solid #b0b8cc;
    border-bottom: none;
  }

  .row + .row { border-top: none; }

  .cell {
    display: flex;
    align-items: stretch;
    border-right: 0.5px solid #b0b8cc;
    min-height: 30px;
  }
  .cell-label {
    align-self: stretch;
  }
  .cell:last-child { border-right: none; }

  .cell-label {
    background: #eef1f7;
    color: #1a3a6b;
    font-size: 13.5px;
    font-weight: 500;
    padding: 5px 8px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    align-self: stretch;
    width: 80px;
    min-width: 80px;
    border-right: 0.5px solid #b0b8cc;
    letter-spacing: 0.5px;
  }
  .cell-value {
    flex: 1;
    padding: 5px 8px;
    font-size: 13.5px;
    color: #222;
    min-width: 0;
  }
  .cell-value input[type="text"],
  .cell-value input[type="tel"],
  .cell-value input[type="date"] {
    width: 100%;
    border: none;
    outline: none;
    font-size: 13.5px;
    font-family: inherit;
    background: transparent;
    color: #222;
    padding: 0;
  }
  .cell-value.line {
    border-bottom: none;
    display: flex;
    align-items: flex-end;
  }
  .underline {
    display: block;
    width: 100%;
    border-bottom: 0.5px solid #999;
    height: 18px;
  }

  /* 服務項目 checkboxes */
  .checkbox-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
    padding: 7px 10px;
    align-items: center;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13.5px;
    color: #222;
    white-space: nowrap;
  }
  .checkbox-item input[type="checkbox"] {
    width: 15px;
    height: 15px;
    min-width: 15px;
    min-height: 15px;
    flex-shrink: 0;
    accent-color: #1a3a6b;
    cursor: pointer;
  }

  /* 工作內容 */
  .work-content-box {
    border: 0.5px solid #b0b8cc;
    flex: 1;
    min-height: 120px;
    padding: 8px 10px;
    font-size: 13.5px;
    line-height: 2;
    background: repeating-linear-gradient(
      to bottom,
      #fff 0px, #fff 23px,
      #e8ecf5 23px, #e8ecf5 24px
    );
  }

  /* 簽名區 */
  .sign-row {
    display: flex;
    border: 0.5px solid #b0b8cc;
    margin-top: 10px;
  }
  .sign-cell {
    flex: 1;
    padding: 8px 10px;
    border-right: 0.5px solid #b0b8cc;
  }
  .sign-cell:last-child { border-right: none; }
  .sign-label {
    font-size: 13.5px;
    font-weight: 500;
    color: #1a3a6b;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .sign-box {
    height: 100px;
    border: 0.5px dashed #aaa;
    border-radius: 3px;
    background: #fafbfd;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 4px 8px;
  }
  .sign-date {
    font-size: 10px;
    color: #999;
  }

  /* 頁腳 */
  .footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #aaa;
    border-top: 0.5px solid #ddd;
    padding-top: 6px;
  }


  /* ── 手機響應式 ── */
  @media screen and (max-width: 600px) {
    body { padding: 0; background: #f0f2f7; }
    .page { width: 100%; min-height: 100vh; padding: 12px; padding-bottom: 80px; }
    .header { display: grid !important; grid-template-columns: auto 1fr auto; grid-template-rows: auto auto; gap: 4px 8px; align-items: start !important; }
    .header img { grid-column: 1; grid-row: 1; height: 36px; width: auto; align-self: center; }
    .logo-placeholder { grid-column: 1; grid-row: 1; width: 70px; height: 36px; font-size: 10px; align-self: center; }
    .header .company-info { grid-column: 1 / 3; grid-row: 2; font-size: 11px; }
    .header > div:last-child { grid-column: 3; grid-row: 1; font-size: 11px !important; text-align: right !important; white-space: nowrap; align-self: center; }
    .doc-title { font-size: 16px; letter-spacing: 4px; }
    .doc-title { font-size: 16px; letter-spacing: 4px; padding: 8px 0; }
    .row { flex-direction: column; border-bottom: none; }
    .row + .row { border-top: 0.5px solid #b0b8cc; }
    .cell { border-right: none; border-bottom: 0.5px solid #b0b8cc; min-height: 44px; }
    .cell:last-child { border-bottom: none; }
    .cell-label { width: 90px; min-width: 90px; font-size: 13px; }
    .cell-value { font-size: 13px; }
    .row { border-bottom: none; }
    .row:last-of-type { border-bottom: 0.5px solid #b0b8cc; }
    .checkbox-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 10px 8px !important; padding: 12px !important; }
    .checkbox-item { font-size: 13px; gap: 6px; }
    .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; min-height: 18px; }
    .work-content-box { min-height: 150px; font-size: 15px; line-height: 1.8; }
    .sign-row { flex-direction: column; }
    .sign-cell { border-right: none; border-bottom: 0.5px solid #b0b8cc; padding: 12px; }
    .sign-cell:last-child { border-bottom: none; }
    .sign-box { height: 120px; }
    .sign-label { font-size: 15px; margin-bottom: 8px; }
    .section { font-size: 13px; padding: 5px 10px; margin-top: 14px; }
    .footer { flex-direction: column; gap: 4px; font-size: 10px; }
  }

  /* 列印樣式 */
  @media print {
    @page { margin: 10mm; size: A4; }
    body { background: none; padding: 0; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    html { height: auto !important; }
    body { height: auto !important; overflow: visible !important; }
    .page { width: 100%; min-height: auto !important; height: auto !important; padding: 0; box-shadow: none; display: block !important; }
    .work-content-box { flex: none !important; min-height: 0 !important; height: auto !important; }
    #page-sign { display: none !important; }
    .no-print { display: none !important; }
    .action-bar { display: none !important; }
    #page-form { display: block !important; height: auto !important; }
    * { page-break-inside: auto; }
    .footer { page-break-after: avoid; }
  }

  /* 列印按鈕 */
  .print-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: #1a3a6b;
    color: #fff;
    border: none;
    padding: 12px 22px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
  }
  .print-btn:hover { background: #163060; }

  /* 操作列 */
  .action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: row;
    gap: 0;
    z-index: 200;
    background: #fff;
    border-top: 1px solid #dde2ee;
    padding: 10px 16px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  }
  .action-bar .print-btn {
    position: static;
    flex: 1;
    justify-content: center;
    margin: 0 4px;
    padding: 12px;
    font-size: 14px;
  }
  .action-bar .print-btn.danger { background: #c0392b; }
  .action-bar .print-btn.danger:hover { background: #a93226; }
  @media print { .action-bar { display: none !important; } }

  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.85);
    color: #fff;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    z-index: 9998;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>

<script>
  let sigTarget = null;
  let sigDrawing = false;
  let sigLastX = 0, sigLastY = 0;
  let sigHasData = false;
  const sigSaved = { staff: null, client: null };
  const signCanvas = document.getElementById('sign-canvas');
  let signCtx = null;

  function resizeSignCanvas() {
    if (!document.getElementById('page-sign').classList.contains('active')) return;
    var pg = document.getElementById('page-sign');
    var usedH = 0;
    for (var i = 0; i < pg.children.length; i++) {
      if (pg.children[i] === signCanvas) break;
      usedH += pg.children[i].offsetHeight;
    }
    // 用 visualViewport 取得真正可視高度（排除瀏覽器 UI）
    var viewH = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    var canvasH = Math.max(200, viewH - usedH);
    signCanvas.style.height = canvasH + 'px';

    var dpr = window.devicePixelRatio || 1;
    var w = signCanvas.offsetWidth;
    var h = signCanvas.offsetHeight;
    // 保留已有簽名內容
    var tempData = sigHasData ? signCanvas.toDataURL() : null;
    signCanvas.width = w * dpr;
    signCanvas.height = h * dpr;
    signCtx = signCanvas.getContext('2d');
    signCtx.scale(dpr, dpr);
    signCtx.strokeStyle = '#1a3a6b';
    signCtx.lineWidth = 2.5;
    signCtx.lineCap = 'round';
    signCtx.lineJoin = 'round';
    if (tempData) {
      var img = new Image();
      img.onload = function() { signCtx.drawImage(img, 0, 0, w, h); };
      img.src = tempData;
    }
  }

  function openSign(target) {
    sigTarget = target;
    sigHasData = false;
    sigDrawing = false;
    document.getElementById('sign-page-title').textContent = target === 'staff' ? '服務人員簽名' : '客戶代表簽名';
    document.body.classList.add('signing');
    document.getElementById('page-sign').classList.add('active');
    window.scrollTo(0, 0);

    // 請求全螢幕
    var el = document.getElementById('page-sign');
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

    setTimeout(resizeSignCanvas, 100);
    setTimeout(resizeSignCanvas, 400);
  }

  // 監聽 visualViewport resize（處理 Safari 網址列出現/消失）
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resizeSignCanvas);
  }
  window.addEventListener('resize', resizeSignCanvas);
  window.addEventListener('orientationchange', function() {
    setTimeout(resizeSignCanvas, 300);
  });

  function closeSignPage() {
    document.getElementById('page-sign').classList.remove('active');
    document.body.classList.remove('signing');
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    window.scrollTo(0, 0);
  }

  function clearSignPage() {
    if (!signCtx) return;
    signCtx.clearRect(0, 0, signCanvas.offsetWidth, signCanvas.offsetHeight);
    sigHasData = false;
  }

  function confirmSignPage() {
    if (!sigHasData) { alert('請先完成簽名'); return; }
    sigSaved[sigTarget] = signCanvas.toDataURL('image/png');
    const preview = document.getElementById('sign-preview-' + sigTarget);
    preview.innerHTML = '<img src="' + sigSaved[sigTarget] + '" style="width:100%; height:100%; object-fit:contain; pointer-events:none;">';
    closeSignPage();
  }

  function clearSig(target) {
    sigSaved[target] = null;
    const preview = document.getElementById('sign-preview-' + target);
    preview.innerHTML = '<span style="color:#bbb; font-size:13px; pointer-events:none;">點此簽名</span>';
  }

  function getPos(e) {
    const r = signCanvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  // Pointer Events API — 統一處理滑鼠、觸控筆、手指，跨平台不受瀏覽器版本影響
  signCanvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    signCanvas.setPointerCapture(e.pointerId);
    sigDrawing = true;
    const p = getPos(e);
    sigLastX = p.x; sigLastY = p.y;
  });
  signCanvas.addEventListener('pointermove', e => {
    if (!sigDrawing) return;
    e.preventDefault();
    const p = getPos(e);
    signCtx.beginPath();
    signCtx.moveTo(sigLastX, sigLastY);
    signCtx.lineTo(p.x, p.y);
    signCtx.stroke();
    sigLastX = p.x; sigLastY = p.y;
    sigHasData = true;
  });
  signCanvas.addEventListener('pointerup', () => { sigDrawing = false; });
  signCanvas.addEventListener('pointercancel', () => { sigDrawing = false; });

  window.addEventListener('load', function() {
    // safe-area CSS 變數（iOS 網址列高度）
    document.documentElement.style.setProperty('--sab',
      getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-bottom)') || '0px');

    // 自動產生單號
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth()+1).padStart(2,'0');
    var d = String(now.getDate()).padStart(2,'0');
    var r = String(Math.floor(Math.random()*900)+100);
    document.getElementById('doc-no').value = 'SV-' + y + m + d + '-' + r;

    document.getElementById('cb-other').addEventListener('change', function() {
      var input = document.getElementById('other-text');
      input.style.display = this.checked ? 'inline-block' : 'none';
      if (this.checked) setTimeout(function(){ input.focus(); }, 50);
    });
    var now2 = new Date();
    var ty = now2.getFullYear();
    var tm = String(now2.getMonth()+1).padStart(2,'0');
    var td = String(now2.getDate()).padStart(2,'0');
    document.getElementById('f-date').value = ty + '/' + tm + '/' + td;
    document.getElementById('f-confirm-date').value = now2.toISOString().split('T')[0];
  });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
  // ── 鎖定 / 解鎖表單 ──
  let formLocked = false;

  function toggleLock() {
    formLocked = !formLocked;

    document.querySelectorAll(
      '#page-form input[type="text"], #page-form input[type="tel"], ' +
      '#page-form input[type="date"], #page-form input[type="checkbox"]'
    ).forEach(el => { el.disabled = formLocked; });
    document.getElementById('doc-no').disabled = formLocked;

    const wc = document.getElementById('work-content');
    wc.contentEditable = formLocked ? 'false' : 'true';
    wc.style.cursor = formLocked ? 'default' : '';

    const staffBtn = document.getElementById('sign-preview-staff');
    staffBtn.disabled = formLocked;
    staffBtn.style.cursor = formLocked ? 'default' : 'pointer';

    const staffResign = document.getElementById('staff-resign-btn');
    if (staffResign) staffResign.style.visibility = formLocked ? 'hidden' : '';

    const lockBtn = document.getElementById('lock-btn');
    if (formLocked) {
      lockBtn.textContent = '解鎖表單';
      lockBtn.classList.add('danger');
      showToast('表單已鎖定，請客戶確認後簽名');
    } else {
      lockBtn.textContent = '鎖定表單';
      lockBtn.classList.remove('danger');
      showToast('表單已解鎖，可繼續編輯');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
  }

  // ── 下載 PDF ──
  async function downloadPDF() {
    const btn = document.getElementById('pdf-btn');
    btn.textContent = '處理中…';
    btn.disabled = true;
    try {
      const { jsPDF } = window.jspdf;
      // 直接截 .page 元素（避免 action-bar 和 page-sign 干擾高度）
      const el = document.querySelector('.page');

      // 處理不支援的 color() 函數
      const allEls = document.querySelectorAll('*');
      const origStyles = [];
      allEls.forEach(function(e) {
        const cs = window.getComputedStyle(e);
        const orig = { el: e, color: e.style.color, bg: e.style.backgroundColor };
        origStyles.push(orig);
        if (cs.color && cs.color.includes('color(')) e.style.color = '#222222';
        if (cs.backgroundColor && cs.backgroundColor.includes('color(')) e.style.backgroundColor = '#ffffff';
      });

      const contentH = el.scrollHeight;
      const contentW = el.scrollWidth;

      const canvas = await html2canvas(el, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        scrollX: 0,
        scrollY: 0,
        width: contentW,
        height: contentH,
        windowWidth: contentW,
        windowHeight: contentH,
        onclone: function(doc) {
          // 隱藏不需要截圖的元素
          var ab = doc.querySelector('.action-bar');
          if (ab) ab.style.display = 'none';
          var ps = doc.getElementById('page-sign');
          if (ps) ps.style.display = 'none';

          // 強制整個 body 用電腦版樣式（覆蓋手機版 CSS）
          doc.body.style.cssText = 'margin:0; padding:32px 16px; background:#e8eaf0; display:flex; justify-content:center; font-family:inherit;';

          // 強制 page 固定寬度
          var page = doc.querySelector('.page');
          if (page) {
            page.style.cssText = 'width:794px; min-height:auto; background:#fff; padding:40px 52px; display:flex; flex-direction:column; box-sizing:border-box;';
          }

          // 強制 header 橫排
          var header = doc.querySelector('.header');
          if (header) {
            header.style.cssText = 'display:flex; flex-direction:row; align-items:flex-end; gap:16px; padding-bottom:10px; border-bottom:3px solid #1a3a6b; margin-bottom:6px;';
          }

          // 強制 header img
          var img = doc.querySelector('.header img');
          if (img) img.style.cssText = 'height:48px; width:auto; margin-bottom:2px;';

          // 強制 company-info
          var ci = doc.querySelector('.company-info');
          if (ci) ci.style.cssText = 'font-size:10.5px; color:#444; line-height:1.7; flex:1;';

          // 強制單號 div 靠右
          var docno = doc.querySelector('.header > div:last-child');
          if (docno) docno.style.cssText = 'flex-shrink:0; font-size:12px; color:#1a3a6b; font-weight:500; white-space:nowrap; display:flex; align-items:center; gap:4px;';

          // 強制 row 橫排
          doc.querySelectorAll('.row').forEach(function(r) {
            r.style.flexDirection = 'row';
          });
          doc.querySelectorAll('.cell').forEach(function(c) {
            c.style.borderRight = '0.5px solid #b0b8cc';
            c.style.borderBottom = 'none';
          });

          // 強制 checkbox-grid 橫排
          var cg = doc.querySelector('.checkbox-grid');
          if (cg) {
            cg.style.cssText = 'display:grid; grid-template-columns:repeat(6,1fr); gap:6px 8px; padding:8px 10px; overflow:hidden;';
          }

          // 強制簽名欄橫排
          var sr = doc.querySelector('.sign-row');
          if (sr) sr.style.flexDirection = 'row';
          doc.querySelectorAll('.sign-cell').forEach(function(sc) {
            sc.style.borderRight = '0.5px solid #b0b8cc';
            sc.style.borderBottom = 'none';
          });

          // 修 color()
          doc.querySelectorAll('*').forEach(function(e) {
            try {
              var cs = window.getComputedStyle(e);
              if (e.style.color && e.style.color.includes('color(')) e.style.color = '#222222';
              if (e.style.backgroundColor && e.style.backgroundColor.includes('color(')) e.style.backgroundColor = '#ffffff';
            } catch(err) {}
          });
        }
      });

      // 還原樣式
      origStyles.forEach(function(o) {
        o.el.style.color = o.color;
        o.el.style.backgroundColor = o.bg;
      });

      // 強制單頁：用實際內容高度作為 PDF 頁面高度
      const pdfW = 210;
      const pdfH = Math.round((canvas.height / canvas.width) * pdfW);
      const imgData = canvas.toDataURL('image/jpeg', 0.95);

      // 用內容實際高度建立 PDF，不套 A4 固定高度
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [pdfW, pdfH]
      });
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);

      const company = document.getElementById('f-company').value.trim() || '客戶';
      const date = document.getElementById('f-date').value || new Date().toISOString().split('T')[0];
      pdf.save('服務紀錄單_' + company + '_' + date + '.pdf');

    } catch(e) {
      alert('PDF 產生失敗：' + e.message);
    } finally {
      btn.textContent = '列印 / 存 PDF';
      btn.disabled = false;
    }
  }
</script>

<div class="action-bar no-print">
  <button class="print-btn" id="lock-btn" onclick="toggleLock()">鎖定表單</button>
  <button class="print-btn" id="pdf-btn" onclick="downloadPDF()">列印 / 存 PDF</button>
</div>
<div id="toast"></div>

</body>
</html>
